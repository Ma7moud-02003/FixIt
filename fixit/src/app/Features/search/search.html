<div class=" relative top-0  bg-gray-50  ">
  <div class="  flex gap-10 ">
    


    <main class="w-full p-10 lg:w-[85%] absolute right-0">
        <!-- search part  -->
 
       <section class="space-y-6 w-full">
  
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div class="text-right">
      <h1 class="text-3xl font-bold text-neutral-900">البحث عن فنيين</h1>
      <p class="text-neutral-600 mt-1">اكتشف أفضل الكفاءات لصيانة منزلك في منطقتك</p>
    </div>
    
    <div class="relative min-w-50">
      <select class="w-full appearance-none bg-white border-0 rounded-xl py-3 px-4 pr-10  text-sm  focus:border-sky-500">
        <option>ترتيب حسب: الأعلى تقييماً</option>
        <option>ترتيب حسب: الأحدث</option>
      </select>
      <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-neutral-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>
  </div>

  <div class="relative border border-neutral-100 rounded-2xl p-2 ">
    <input type="search" placeholder="... ابحث بالاسم، التخصص، أو الكلمات المفتاحية" class="w-full rounded-xl py-3 px-12 text-sm text-neutral-800 placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-sky-200">
    <div class="absolute inset-y-0 right-0 flex items-center pr-5 text-neutral-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </div>
  </div>

  <div class="flex py-5 md:flex-wrap  items-center gap-3 overflow-x-auto pb-2 -mb-2 text-right w-full">
    <button class="bg-sky-100 text-sky-700 font-medium text-sm py-2 px-6 rounded-full whitespace-nowrap">كل الفئات</button>
      @for(catog of categories();track catog)
  {
    <button class="bg-white text-neutral-700 text-sm py-2 px-6 rounded-full border border-neutral-200 whitespace-nowrap hover:bg-neutral-50 hover:border-neutral-300">
        {{catog.name}}
    </button>
  }
  </div>

  <div class="text-left text-sm py-4 text-neutral-500 font-medium pr-1">
  {{allWorkers().length}} فني 
  </div>

</section>

<!-- cards -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3  gap-4">
@for (worker of allWorkers(); track worker) {
<app-worker-card [worker]="worker"></app-worker-card>
}
</div>
  <section class="flex justify-center pt-8">
  <div class="bg-white border border-neutral-100 rounded-full py-1.5 px-2 shadow-sm flex items-center gap-1.5">
    
    <button class="w-10 h-10 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>
    
    <button class="w-10 h-10 flex items-center justify-center text-sm text-neutral-600 font-medium hover:text-sky-700">12</button>
    <div class="w-10 h-10 flex items-center justify-center text-sm text-neutral-400">...</div>
    <button class="w-10 h-10 flex items-center justify-center text-sm text-neutral-600 font-medium hover:text-sky-700">3</button>
    <button class="w-10 h-10 flex items-center justify-center text-sm text-neutral-600 font-medium hover:text-sky-700">2</button>
    <button class="w-10 h-10 flex items-center justify-center text-sm text-white font-semibold rounded-full bg-sky-600">1</button>
    
    <button class="w-10 h-10 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    
  </div>
</section>

      </main>
<aside dir="ltr" class="lg:block hidden fixed left-0  lg:h-screen overflow-auto w-[14%] top-0    hide-scrollbar p-3 ">
  
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-bold text-gray-900">تصفية النتائج</h2>
    <button class="text-sm font-medium text-sky-500 hover:text-sky-600 transition-colors">إعادة ضبط</button>
  </div>

  <div class="space-y-4">
    
    <section class="text-sm">
      <button class="flex items-center justify-between w-full mb-2 text-gray-900 font-bold group">
        <span>التخصص</span>
     <i class="fas fa-bag-shopping text-gray-400"></i>
      </button>
      <div class="space-y-1 px-1">
          @for(catog of categories();track catog)
       {
        <label class="flex items-center justify-between cursor-pointer group">
          <span class="text-gray-700 text-sm group-hover:text-sky-600 transition-colors">{{catog.name}}</span>
          <input type="checkbox" [(ngModel)]="catog.selected"  class="w-3 h-3 rounded-full border-gray-300 text-sky-500 focus:ring-sky-200 transition-all cursor-pointer">
        </label>
    }
      </div>
    </section>

    <section class="border-t border-gray-50 pt-6 text-sm">
      <button class="flex items-center justify-between w-full mb-4 text-gray-900 font-bold group">
        <span>المدينة</span>
      <i class="fas fa-city text-gray-400"></i>
    </button>
      <div class="space-y-1 px-1">
        @for(city of egyptGovernorates();track city)
        {
  <label class="flex items-center justify-between cursor-pointer group">
          <span class="text-gray-700 text-sm">{{city.name}}</span>
          <input type="checkbox" [(ngModel)]="city.selected" class="w-3 h-3 rounded border-gray-300 text-sky-500 focus:ring-sky-200">
        </label>
       
        }
      
      </div>
    </section>

    <section class="border-t border-gray-50 pt-6">
      <button class="flex items-center justify-between w-full mb-4 text-gray-900 font-bold">
        <span>التقييم</span>
        <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
      </button>
      <div class="space-y-3 px-1">
        <label class="flex items-center justify-between cursor-pointer group">
          <div class="flex items-center gap-1 text-yellow-400">
            <span class="text-gray-700 text-sm ml-2">5 نجوم وأكثر</span>
            <div class="flex">
              <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
            </div>
          </div>
          <input type="checkbox" class="w-3 h-3 rounded border-gray-300 text-sky-500 focus:ring-sky-200">
        </label>
      </div>
    </section>

    <section class="border-t border-gray-50 pt-6   w-full bg-white ">
      <button class="flex items-center justify-between w-full mb-4 text-gray-900 font-bold">
        <span>حالة التوافر</span>
        <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
      </button>
      <label class="flex items-center justify-between cursor-pointer group px-1">
        <span class="text-gray-700 text-sm">متاح الآن فقط</span>
        <input type="checkbox" class="w-3 h-3 rounded border-gray-300 text-sky-500 focus:ring-sky-200">
      </label>
        <div class="pt-4">
      <button class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-sky-100 active:scale-[0.98]">
        <svg class="w-3 h-3 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
        تطبيق التصفية
      </button>
    </div>
    </section>

  
  </div>
</aside>
  </div>
</div>
