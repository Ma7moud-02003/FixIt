<div class="h-screen bg-[#f8fafc] overflow-hidden flex flex-col px-4 py-8" dir="rtl">
  <header class="text-center mb-6 shrink-0">
    <h1 class="text-3xl font-[900] text-slate-900 tracking-tight">اطلب خدمتك الآن</h1>
    <p class="text-slate-500 font-bold text-sm">أقل من دقيقة وسنصلك بأفضل الفنيين</p>
  </header>

  <main class="max-w-5xl mx-auto w-full flex-1 min-h-0 flex flex-col">
    <div class="bg-white rounded-[2.5rem] shadow-[0_40px_100px_-20px_rgba(0,0,0,0.05)] border border-slate-100 flex-1 flex flex-col min-h-0 overflow-hidden">
      
      <form class="flex-1 flex flex-col md:flex-row min-h-0">
        
        <div class="flex-1 p-8 md:p-10 space-y-6 overflow-y-auto custom-scrollbar">
          <div class="space-y-4">
            <h3 class="text-lg font-black text-blue-600 flex items-center gap-2">
                <span class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-sm">1</span>
                تفاصيل المشكلة
            </h3>
            
            <div class="space-y-2">
              <label class="text-[12px] font-black text-slate-400 mr-2 uppercase">عنوان الطلب</label>
              <input type="text" [formField]="addServiceForm.serviceTitle" 
                     placeholder="مثال: تصليح تسريب في حوض المطبخ" 
                     class="w-full px-5 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50/50 focus:bg-white focus:border-blue-500 outline-none transition-all font-bold text-slate-700">
            </div>

            <div class="space-y-2">
              <label class="text-[12px] font-black text-slate-400 mr-2 uppercase">وصف المشكلة</label>
              <textarea rows="4" [formField]="addServiceForm.serviceDescription" 
                        placeholder="اشرح ما تحتاجه بالضبط..." 
                        class="w-full px-5 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50/50 focus:bg-white focus:border-blue-500 outline-none transition-all resize-none font-medium text-slate-600"></textarea>
            </div>
          </div>
        </div>

        <div class="w-full md:w-[380px] bg-slate-50/50 p-8 flex flex-col justify-between border-r border-slate-100">
          <div class="space-y-4">
            <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <span class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center text-sm">2</span>
                صور المشكلة
            </h3>

            <label for="img" class="relative block cursor-pointer group">
              <div class="h-48 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center bg-white group-hover:border-blue-400 transition-all overflow-hidden">
                @if(imagePreview()) {
                  <img [src]="imagePreview()" class="w-full h-full object-cover">
                  <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <span class="text-white text-xs font-black">تغيير الصورة</span>
                  </div>
                } @else {
                  <i class="fas fa-cloud-upload-alt text-2xl text-slate-300 mb-2 group-hover:text-blue-500 group-hover:scale-110 transition-all"></i>
                  <p class="text-[11px] font-black text-slate-400">اضغط لرفع صورة</p>
                }
              </div>
            </label>
            <input (change)="onFileSelected($event)" class="hidden" type="file" id="img">
          </div>

          <div class="pt-6 space-y-4">
            <button (click)="requireService($event)" 
        [disabled]="addServiceForm().invalid() || isLoading()" 
        class="w-full py-5 bg-slate-900 text-white rounded-2xl text-sm font-black shadow-xl shadow-slate-200 hover:bg-blue-600 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-wait flex items-center justify-center gap-3 relative overflow-hidden">
  
  @if (isLoading()) {
    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span>جاري الإرسال...</span>
  } @else {
    <span>إرسال الطلب الآن</span>
    <i class="fas fa-chevron-left text-[10px]"></i>
  }

  @if (isLoading()) {
    <div class="absolute inset-0 bg-white/10 animate-pulse"></div>
  }
</button>
            <p class="text-[10px] text-center text-slate-400 font-bold leading-relaxed">
                <i class="fas fa-shield-alt text-emerald-500 ml-1"></i>
                بياناتك محمية ومشفرة بالكامل
            </p>
          </div>
        </div>

      </form>
    </div>

    <div class="grid grid-cols-3 gap-4 mt-6 shrink-0 px-4">
        <div class="flex items-center gap-3 bg-white/50 p-3 rounded-2xl border border-white/20">
            <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center text-xs"><i class="fas fa-tag"></i></div>
            <span class="text-[11px] font-black text-slate-600 uppercase">أسعار تنافسية</span>
        </div>
        <div class="flex items-center gap-3 bg-white/50 p-3 rounded-2xl border border-white/20">
            <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs"><i class="fas fa-bolt"></i></div>
            <span class="text-[11px] font-black text-slate-600 uppercase">تواصل سريع</span>
        </div>
        <div class="flex items-center gap-3 bg-white/50 p-3 rounded-2xl border border-white/20">
            <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-xs"><i class="fas fa-check-double"></i></div>
            <span class="text-[11px] font-black text-slate-600 uppercase">فنيين معتمدين</span>
        </div>
    </div>
  </main>
</div>
