<!-- =====================================================================
     MOBILE BOTTOM NAV  –  Angular 17+ Standalone | Tailwind CSS
     ثابت في أسفل الشاشة على الموبايل، مخفي على lg+ (الـ aside يظهر بدله)
     ===================================================================== -->

<!--
  الاستراتيجية:
  • موبايل (xs → md) : bottom nav ثابت في الأسفل — flex lg:hidden
  • lg+              : مخفي تماماً، الـ aside الجانبي يأخذ دوره
  • active item      : أيقونة ترتفع مع دائرة خلفها (pill indicator)
  • pb-safe          : padding-bottom: env(safe-area-inset-bottom) للـ iPhone notch
-->

<nav
  class="fixed bottom-0 left-0 right-0 z-50
         flex lg:hidden
         bg-white/95 backdrop-blur-xl
         border-t border-slate-100
         shadow-[0_-4px_24px_rgba(0,0,0,0.07)]"
  style="padding-bottom: env(safe-area-inset-bottom);"
  role="navigation"
  aria-label="القائمة الرئيسية"
>
  <!-- ننشر الـ navItems اللي عندك — بس نأخذ أهم 5 عناصر للموبايل -->
  @for (item of mobileNavItems(); track item.label) {
    <a
      class="relative flex-1 flex flex-col items-center justify-end
             pb-2 pt-1 cursor-pointer select-none
             transition-all duration-200 group min-w-0"
      [attr.aria-label]="item.label"
      [attr.aria-current]="item.active ? 'page' : null"
      (click)="setActive(item)"
    >

      <!-- Active pill indicator خلف الأيقونة -->
      @if (item.active) {
        <span
          class="absolute top-1 left-1/2 -translate-x-1/2
                 w-10 h-10 rounded-2xl bg-slate-900
                 transition-all duration-300"
        ></span>
      }

      <!-- الأيقونة -->
      <span
        class="relative z-10 transition-transform duration-300 mb-1"
        [class.-translate-y-1]="item.active"
        [class.translate-y-0]="!item.active"
      >
        <svg
          class="w-5 h-5 transition-colors duration-200"
          [class.text-white]="item.active"
          [class.text-slate-400]="!item.active"
          [class.group-hover:text-slate-700]="!item.active"
          fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24"
        >
          <!-- grid / dashboard -->
          @if (item.icon === 'grid') {
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          }
          <!-- users -->
          @if (item.icon === 'users') {
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2
                 M9 7a4 4 0 100 8 4 4 0 000-8z
                 M23 21v-2a4 4 0 00-3-3.87
                 M16 3.13a4 4 0 010 7.75"/>
          }
          <!-- briefcase / workers -->
          @if (item.icon === 'briefcase') {
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
          }
          <!-- table / categories -->
          @if (item.icon === 'table') {
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M3 15h18M9 3v18"/>
          }
          <!-- clipboard / services -->
          @if (item.icon === 'clipboard') {
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                 M9 5a2 2 0 002 2h2a2 2 0 002-2
                 M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          }
          <!-- credit-card -->
          @if (item.icon === 'credit-card') {
            <rect x="1" y="4" width="22" height="16" rx="2"/>
            <path d="M1 10h22"/>
          }
          <!-- star / reviews -->
          @if (item.icon === 'star') {
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02
                             12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          }
          <!-- message / chat -->
          @if (item.icon === 'message') {
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          }
        </svg>
      </span>

      <!-- Label -->
      <span
        class="relative z-10 text-[10px] font-medium leading-none
               transition-colors duration-200 truncate max-w-full px-1"
        [class.text-slate-900]="item.active"
        [class.font-semibold]="item.active"
        [class.text-slate-400]="!item.active"
        [class.group-hover:text-slate-600]="!item.active"
      >
        {{ item.label }}
      </span>

    </a>
  }

  <!-- زرار تسجيل الخروج — آخر slot ثابت -->
  <button
    class="flex-1 flex flex-col items-center justify-end pb-2 pt-1
           cursor-pointer select-none group min-w-0"
    aria-label="تسجيل الخروج"
  >
    <span class="mb-1">
      <svg class="w-5 h-5 text-rose-400 group-hover:text-rose-600 transition-colors duration-200"
           fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
    </span>
    <span class="text-[10px] font-medium text-rose-400 group-hover:text-rose-600
                 transition-colors duration-200">
      خروج
    </span>
  </button>

</nav>

<!--
  ════════════════════════════════════════════════════════════════
  تذكر تضيف padding-bottom للصفحة الرئيسية على الموبايل
  عشان المحتوى ما يتغطاش بالنافبار:

  <main class="pb-20 lg:pb-0">...</main>
  ════════════════════════════════════════════════════════════════
-->
