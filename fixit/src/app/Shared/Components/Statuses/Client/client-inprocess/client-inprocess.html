<div class="mx-auto  overflow-hidden bg-white rounded-3xl border border-slate-100 p-5 shadow-2xl shadow-slate-200/50" dir="rtl">

  <!-- رأس الكارت: معلومات الفني -->

    <div class="relative">
      <img src="/workers/manWorker.png" alt="Worker" class="h-12 w-12 rounded-xl object-cover ring-2 ring-white shadow-sm">
      <span class="absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full border-2 border-white bg-emerald-500 shadow-sm"></span>
    </div>
    <div class="flex-1">
      <h3 class="text-sm font-bold text-slate-800 leading-none">{{workerName()}}</h3>

    <!-- أيقونة تنبيه علوية صغيرة -->
    <div class="flex h-8 w-8 items-center justify-center rounded-lg  border border-slate-100 text-slate-400">

        <svg class="h-5 w-5 animate-spin" viewBox="0 0 24 24">

    <p class="text-[10px] text-slate-400 mt-1">يتم الآن العمل على طلبك بدقة</p>
    
    <div class="mt-4 h-1.5 w-full overflow-hidden rounded-full bg-slate-100 border border-slate-50">
      <div class="h-full w-2/3 animate-pulse rounded-full bg-linear-to-r from-blue-400 to-blue-600"></div>
