<div class="mx-auto overflow-hidden rounded-[2.5rem] border border-slate-100 bg-white shadow-2xl shadow-blue-100/40 p-8 dir-rtl">
  
  <div class="mb-8 flex items-center gap-5 p-4 bg-slate-50/50 rounded-3xl border border-slate-50">
    <div class="relative">
      <img src="/workers/manWorker.png"
           alt="Worker Avatar" 
           class="w-16 h-16 rounded-2xl object-cover shadow-sm ring-4 ring-white">
      <div class="absolute -bottom-1 -right-1 h-5 w-5 rounded-full border-4 border-white bg-green-500"></div>
    </div>
    
    <div class="flex-1">
      <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">الفني القائم بالعمل</p>
      <h3 class="text-lg font-black text-slate-800 leading-tight">{{workerName()}}</h3>
    </div>

    <button class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-100 text-blue-600 shadow-sm hover:bg-blue-50 transition-all active:scale-90">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
      </svg>
    </button>
  </div>

  <div class="mb-8 px-6 py-4 rounded-2xl bg-blue-50 border border-blue-100/50 relative overflow-hidden group">
    <div class="absolute -right-2 top-0 bottom-0 w-1 bg-blue-500 rounded-full"></div>
    <p class="text-sm leading-relaxed text-blue-900 font-medium">
      تم قبول الخدمة بنجاح! الفني في طريقه إليك الآن لمباشرة العمل وتلبية طلبك.
    </p>
  </div>

  <div class="mb-10 w-full text-center space-y-4">
    <div class="relative w-24 h-24 mx-auto flex items-center justify-center">
      <div class="absolute inset-0 rounded-full bg-blue-400 opacity-20 animate-ping"></div>
      <div class="absolute inset-2 rounded-full bg-blue-400 opacity-30 animate-pulse"></div>
      
      <div class="relative w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-200">
        <i class="fa fa-spinner fa-spin text-2xl"></i>
      </div>
    </div>
    
    <div>
      <h3 class="text-2xl font-black text-slate-800 tracking-tight">الخدمة قيد التنفيذ</h3>
      <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-1">يتم الآن العمل على طلبك</p>
    </div>
  </div>

  <button class="w-full group flex items-center justify-center gap-3 rounded-[1.25rem] bg-slate-900 py-4 text-sm font-black text-white transition-all hover:bg-slate-800 hover:shadow-xl active:scale-[0.98]">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
    مراسلة الفني الآن
  </button>
  
  <button class="w-full group flex items-center justify-center gap-3 rounded-[1.25rem] bg-slate-900 py-4 text-sm font-black text-white transition-all hover:bg-slate-800 hover:shadow-xl active:scale-[0.98]">
<i class="fas fa-warning"></i>
الغاء الخدمه
  </button>
</div>
