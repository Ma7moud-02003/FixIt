<div class="mx-auto overflow-hidden rounded-3xl border border-slate-100 bg-white shadow-xl shadow-slate-200/50 p-6 dir-rtl" style="font-family: 'Cairo', 'Segoe UI', sans-serif;">

  <!-- Worker Info Header -->
  <div class="mb-6 flex items-center gap-4 p-4 bg-gradient-to-l from-slate-50 to-blue-50/40 rounded-2xl border border-slate-100">
    <div class="relative flex-shrink-0">
      <img src="/workers/manWorker.png"
           alt="Worker Avatar"
           class="w-14 h-14 rounded-xl object-cover shadow-md ring-2 ring-white ring-offset-1">
      <div class="absolute -bottom-1 -right-1 h-4 w-4 rounded-full border-2 border-white bg-emerald-500 shadow-sm"></div>
    </div>

    <div class="flex-1 min-w-0">
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">الفني القائم بالعمل</p>
      <h3 class="text-base font-bold text-slate-800 truncate">{{workerName()}}</h3>
      <p class="text-[11px] text-emerald-600 font-semibold flex items-center gap-1 mt-0.5">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full inline-block"></span>
        متاح الآن
      </p>
    </div>

    <button class="flex-shrink-0 w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-md shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
      </svg>
    </button>
  </div>

  <!-- Status Banner -->
  <div class="mb-6 flex items-start gap-3 px-4 py-3.5 rounded-xl bg-blue-50 border border-blue-100">
    <div class="flex-shrink-0 mt-0.5 w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <p class="text-sm leading-relaxed text-blue-800 font-medium">
      تم قبول الخدمة بنجاح! الفني في طريقه إليك الآن لمباشرة العمل وتلبية طلبك.
    </p>
  </div>

  <!-- In Progress Indicator -->
  <div class="mb-8 w-full text-center">
    <div class="relative w-20 h-20 mx-auto flex items-center justify-center mb-5">
      <div class="absolute inset-0 rounded-full bg-blue-400/20 animate-ping"></div>
      <div class="absolute inset-2 rounded-full bg-blue-400/30 animate-pulse"></div>
      <div class="relative w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-300/50">
        <i class="fa fa-spinner fa-spin text-xl"></i>
      </div>
    </div>

    <div class="bg-slate-50 rounded-2xl py-4 px-6 border border-slate-100">
      <h3 class="text-xl font-bold text-slate-800">الخدمة قيد التنفيذ</h3>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mt-1">يتم الآن العمل على طلبك</p>

      <!-- Progress bar -->
      <div class="mt-4 h-1.5 bg-slate-200 rounded-full overflow-hidden">
        <div class="h-full w-2/3 bg-gradient-to-l from-blue-600 to-blue-400 rounded-full animate-pulse"></div>
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <button class="w-full group flex items-center justify-center gap-2.5 rounded-xl bg-slate-900 py-3.5 text-sm font-bold text-white transition-all hover:bg-slate-800 hover:shadow-lg active:scale-[0.98]">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
    مراسلة الفني الآن
  </button>

</div>
