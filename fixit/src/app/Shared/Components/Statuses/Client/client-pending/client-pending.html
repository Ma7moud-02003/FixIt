<div class="mt-12 p-6 bg-white border border-slate-100 rounded-3xl shadow-xl shadow-slate-200/40 text-center animate-in fade-in slide-in-from-bottom-4 duration-500" >

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-lg font-bold text-slate-800">عرض السعر المقدم</h3>
    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-bold text-amber-700 bg-amber-50 rounded-lg border border-amber-100 uppercase tracking-wider">
      <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
      بانتظار ردك
    </span>
  </div>

  <!-- Price Display -->
  <div class="relative py-8 px-6 bg-gradient-to-br from-slate-50 to-blue-50/30 rounded-2xl border border-slate-100 mb-6 overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-l from-blue-600 to-indigo-500 rounded-t-2xl"></div>

    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 block">التكلفة الإجمالية للخدمة</span>

    <div class="flex items-baseline justify-center gap-2">
      <span class="text-5xl font-black text-slate-900 tracking-tight">
        {{price()}}
      </span>
      <div class="flex flex-col items-start leading-none gap-0.5">
        <span class="text-sm font-bold text-blue-600">EGP</span>
        <span class="text-xs font-semibold text-slate-500">جنيه مصري</span>
      </div>
    </div>

    <!-- Trust badges -->
    <div class="mt-5 flex items-center justify-center gap-4">
      <div class="flex items-center gap-1.5 text-[11px] text-slate-400 font-medium">
        <svg class="w-3.5 h-3.5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        سعر شامل
      </div>
      <div class="w-px h-3 bg-slate-200"></div>
      <div class="flex items-center gap-1.5 text-[11px] text-slate-400 font-medium">
        <svg class="w-3.5 h-3.5 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
        </svg>
        دفع بعد الانتهاء
      </div>
    </div>
  </div>

  <!-- Address Input -->
  <div class="mb-5 text-right">
    <label class="block text-sm font-semibold text-slate-700 mb-2">
      <span class="text-red-500 ml-1">*</span>
      عنوان الخدمة التفصيلي
    </label>
    <div class="relative">
      <input
        required
        minlength="5"
        #addresss="ngModel"
        type="text"
        name=""
        [(ngModel)]="address"
        class="w-full py-3 px-4 pr-10 rounded-xl border border-slate-200 bg-white text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        placeholder="مثال: ١٢ شارع النيل، المعادي، القاهرة"
        id="">
      <div class="absolute top-1/2 right-3 -translate-y-1/2 text-slate-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
    </div>
    <p class="text-[11px] text-slate-400 mt-1.5 font-medium">يُستخدم لتوجيه الفني إلى موقعك بدقة</p>
  </div>

  <!-- Action Buttons -->
  <div class="flex flex-col sm:flex-row gap-3 mb-5">
    <button
      [disabled]="addresss.invalid"
      (click)="acceptPrice()"
      class="flex-1 h-14 cursor-pointer bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all shadow-md shadow-emerald-200 active:scale-95 flex items-center justify-center gap-2 group text-sm">
      <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
      قبول العرض وبدء العمل
    </button>

    <button  (click)="rejectService()"
      class="flex-none sm:w-36 h-14 bg-white border border-slate-200 text-slate-500 hover:text-red-600 hover:border-red-200 hover:bg-red-50 font-semibold rounded-xl transition-all active:scale-95 text-sm">
      رفض السعر
    </button>
  </div>

  <!-- Info note -->
  <div class="flex items-center justify-center gap-2 text-[11px] text-slate-400 font-medium bg-slate-50 py-2.5 px-4 rounded-lg border border-slate-100">
    <svg class="w-3.5 h-3.5 text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
    </svg>
    <span>يرجى مراجعة تفاصيل الخدمة قبل اتخاذ القرار النهائي</span>
  </div>

</div>
