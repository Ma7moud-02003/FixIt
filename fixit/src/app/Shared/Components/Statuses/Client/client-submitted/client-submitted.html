<div class="mx-auto mt-12 bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 overflow-hidden border border-slate-50 relative group" dir="rtl">
  <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-l from-blue-600 to-indigo-400"></div>

  <div class="p-10">
    <div class="text-center mb-8">
      <div class="relative mx-auto flex items-center justify-center h-20 w-20 rounded-[2rem] bg-blue-50 mb-6 group-hover:rotate-6 transition-transform duration-500">
        <div class="absolute inset-0 rounded-[2rem] bg-blue-100/50 animate-pulse"></div>
        <svg class="h-10 w-10 text-blue-600 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      
      <h3 class="text-2xl font-black text-slate-800 tracking-tight leading-tight">تأكيد استلام المهمة</h3>
      <p class="mt-3 text-sm text-slate-500 font-medium leading-relaxed max-w-xs mx-auto">
        لقد قام المنفذ بتسليم العمل. يرجى مراجعة النتائج وتأكيد الاستلام لإكمال العملية بنجاح.
      </p>
    </div>

    <div class="flex flex-col space-y-4">
      <button (click)="acceptTask()" 
        class="w-full py-4 px-6 cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl transition-all shadow-lg shadow-blue-100 active:scale-[0.98] flex items-center justify-center gap-2 group/btn">
        <span>نعم، أؤكد الاستلام</span>
        <i class="fas fa-arrow-left text-[10px] group-hover/btn:-translate-x-1 transition-transform"></i>
      </button>
      
      <button (click)="DisputedTask()"
        class="w-full py-4 px-6 bg-white border-2 border-slate-100 cursor-pointer text-slate-400 font-bold rounded-2xl transition-all hover:bg-red-50 hover:text-red-500 hover:border-red-100 active:scale-[0.98]">
        لم أقم باستلام المهمة بعد
      </button>
    </div>

    <div class="mt-8 p-4 bg-slate-50 rounded-2xl border border-slate-100/50">
       <p class="text-[11px] text-center text-slate-400 font-bold flex items-center justify-center gap-2">
         <i class="fas fa-shield-alt text-blue-400"></i>
         بمجرد التأكيد، سيتم تحويل المستحقات للمنفذ مباشرةً.
       </p>
    </div>
  </div>
</div>
