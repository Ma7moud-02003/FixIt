<div class="mx-auto p-10 bg-white rounded-[2.5rem] border border-slate-50 shadow-2xl shadow-slate-200/50 transition-all hover:shadow-slate-300/50" dir="rtl">
  
  <div class="flex items-center gap-4 mb-8">
    <div class="w-12 h-12 bg-cyan-50 rounded-2xl flex items-center justify-center text-cyan-500 shadow-inner">
      <i class="fas fa-hand-holding-usd text-xl"></i>
    </div>
    <div>
      <h3 class="text-xl font-black text-slate-800 tracking-tight">تقديم عرض سعر</h3>
      <p class="text-xs text-slate-400 font-medium">أدخل القيمة العادلة لتنفيذ هذه الخدمة للعميل.</p>
    </div>
  </div>

  <div class="space-y-6">
    <div class="relative group">
      <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 mr-2">المبلغ المقترح للتنفيذ</label>
      
      <div class="relative flex items-center">
        <input 
          type="number" [(ngModel)]="totalPrice" #priceRef="ngModel" name="totalPrice"
          placeholder="0.00" required min="100"
          class="w-full h-20 px-8 bg-slate-50 border-2 border-transparent rounded-3xl text-3xl font-black text-slate-800 focus:bg-white focus:border-cyan-400 focus:ring-8 focus:ring-cyan-50 outline-none transition-all placeholder:text-slate-200"
        />
        
        <div class="absolute left-6 px-4 py-2 bg-white/80 backdrop-blur-md border border-slate-200 rounded-xl text-[11px] font-black text-slate-500 shadow-sm">
           جنية مصري
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3 px-5 py-3.5 bg-cyan-50/50 rounded-2xl border border-cyan-100/50">
      <span class="text-lg">💡</span>
      <p class="text-[11px] text-cyan-700 font-bold leading-relaxed">
        سيتم إضافة رسوم المنصة البسيطة تلقائياً على إجمالي الفاتورة للعميل.
      </p>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row gap-4 mt-10">
    <button 
      [disabled]="priceRef.invalid" 
      (click)="sendPrice(theButton)" 
      #theButton 
      class="flex-[2] h-16 bg-cyan-500 hover:bg-cyan-600 text-white rounded-[1.25rem] font-black text-lg transition-all shadow-lg shadow-cyan-100 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed group"
    >
      إرسال عرض السعر
      <i class="fas fa-paper-plane mr-2 text-sm group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform"></i>
    </button>
    
    <button 
      (click)="rejectService()" 
      class="flex-1 h-16 bg-white border-2 border-slate-100 text-slate-400 rounded-[1.25rem] font-bold hover:bg-red-50 hover:text-red-500 hover:border-red-100 transition-all active:scale-95"
    >
      رفض الخدمة
    </button>
  </div>
</div>
