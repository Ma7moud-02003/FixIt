<div class="mx-auto p-7 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 transition-all" dir="rtl" >

  <!-- Header -->
  <div class="flex items-center gap-4 mb-7">
    <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 border border-blue-100 flex-shrink-0">
      <i class="fas fa-hand-holding-usd text-lg"></i>
    </div>
    <div>
      <h3 class="text-lg font-bold text-slate-800">تقديم عرض سعر</h3>
      <p class="text-xs text-slate-400 font-medium mt-0.5">أدخل القيمة العادلة لتنفيذ هذه الخدمة للعميل</p>
    </div>
  </div>

  <!-- Price Input -->
  <div class="mb-5">
    <label class="block text-xs font-bold text-slate-500 mb-2">المبلغ المقترح للتنفيذ <span class="text-red-400">*</span></label>

    <div class="relative">
      <input
        type="number"
        [(ngModel)]="totalPrice"
        #priceRef="ngModel"
        name="totalPrice"
        placeholder="0"
        required
        min="100"
        class="w-full h-16 px-5 pl-28 bg-slate-50 border-2 border-transparent rounded-xl text-3xl font-black text-slate-800 focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none transition-all placeholder:text-slate-200 text-right"
      />
      <div class="absolute left-3 top-1/2 -translate-y-1/2 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-500 shadow-sm whitespace-nowrap">
        جنيه مصري
      </div>
    </div>

    <!-- Price suggestion chips -->
    <div class="flex gap-2 mt-3 flex-wrap">
      <span class="text-[10px] text-slate-400 font-semibold self-center">اقتراحات:</span>
      <button type="button" class="text-[11px] font-bold px-3 py-1 bg-slate-50 border border-slate-200 rounded-lg text-slate-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">٢٥٠</button>
      <button type="button" class="text-[11px] font-bold px-3 py-1 bg-slate-50 border border-slate-200 rounded-lg text-slate-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">٥٠٠</button>
      <button type="button" class="text-[11px] font-bold px-3 py-1 bg-slate-50 border border-slate-200 rounded-lg text-slate-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">٧٥٠</button>
      <button type="button" class="text-[11px] font-bold px-3 py-1 bg-slate-50 border border-slate-200 rounded-lg text-slate-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">١٠٠٠</button>
    </div>
  </div>

  <!-- Info note -->
  <div class="flex items-start gap-3 px-4 py-3 bg-blue-50/60 rounded-xl border border-blue-100 mb-7">
    <svg class="w-4 h-4 text-blue-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
    </svg>
    <p class="text-xs text-blue-700 font-medium leading-relaxed">
      سيتم إضافة رسوم المنصة تلقائياً على إجمالي الفاتورة للعميل.
    </p>
  </div>

  <!-- Action Buttons -->
  <div class="flex flex-col sm:flex-row gap-3">
    <button
      [disabled]="priceRef.invalid"
      (click)="sendPrice(theButton)"
      #theButton
      class="flex-1 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm transition-all shadow-md shadow-blue-200 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2 group">
      <svg class="w-4 h-4 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
      إرسال عرض السعر
    </button>

    <button
      (click)="rejectService()"
      class="flex-none sm:w-36 h-14 bg-white border border-slate-200 text-slate-500 rounded-xl font-semibold text-sm hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all active:scale-95">
      رفض الخدمة
    </button>
  </div>

</div>
