<div class="mx-auto overflow-hidden rounded-[2.5rem] border border-slate-100 bg-white/90 p-8 shadow-2xl shadow-blue-100/40 backdrop-blur-xl" dir="rtl">
  
  <div class="mb-8 flex items-center gap-5 p-4 bg-slate-50/50 rounded-3xl border border-slate-50">
    <div class="relative">
      <img src="/workers/client.png"
           alt="Client Avatar" 
           class="w-16 h-16 rounded-2xl object-cover shadow-sm ring-4 ring-white">
      <div class="absolute -bottom-1 -right-1 h-5 w-5 rounded-full border-4 border-white bg-green-500"></div>
    </div>
    
    <div class="flex-1">
      <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">العميل الحالي</p>
      <h3 class="text-lg font-black text-slate-800 leading-tight">{{clientName()}}</h3>
    </div>

    <button class="w-24 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-100 text-slate-500 shadow-sm hover:bg-blue-50 hover:text-blue-600 transition-all active:scale-90">
<i class="fas fa-message  text-blue-500"></i>
    </button>
  </div>

  <div class="mb-8 px-6 py-4 rounded-2xl bg-blue-50/50 border border-blue-100/30 text-center">
    <p class="text-sm font-bold text-blue-800 leading-relaxed">
      تمت الموافقة! يرجى التوجه للعنوان وبدء التنفيذ.
    </p>
  </div>

  <div class="mb-10 text-center space-y-4">
    <div class="relative w-24 h-24 mx-auto flex items-center justify-center">
      <div class="absolute inset-0 rounded-full bg-blue-400 opacity-20 animate-ping"></div>
      <div class="absolute inset-4 rounded-full bg-blue-400 opacity-30 animate-pulse"></div>
      
      <div class="relative w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-200">
        <i class="fa fa-spinner fa-spin text-2xl"></i>
      </div>
    </div>
    <h3 class="text-2xl font-black text-slate-800 tracking-tight">المهمة قيد التنفيذ</h3>
    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">جاري العمل الآن</p>
  </div>
  <!-- // proving image -->
<div class="py-3">
  <h5 class="text-sm text-gray-500 p-2">من فضلك قم برفع صوره لاثبات التسليم</h5>
@if(!imagePreview())
{
      <label for="portfolioImg" class="border-2 border-dashed border-cyan-100 bg-cyan-50/30 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:bg-cyan-50 transition-colors">
          <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-4">
            <svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
          </div>
          <p class="font-bold text-gray-700">    اضغط للرفع</p>
          <p class="text-xs text-gray-400 mt-1">حتى 5 ميجابايت (PNG, JPG, JPEG)</p>
        </label>
}@else {
  <div class="relative">
  <img [src]="imagePreview()" loading="lazy" alt="service-image" class="w-full h-[30vh]">
  <button (click)="imagePreview.set('')" class="absolute top-3 right-3 bg-red-600 text-white h-10 w-10 rounded-full flex items-center justify-center">
    <i class="fas fa-trash"></i>
  </button>
  </div>
}

        <input type="file" (change)="onFileSelected($event)" class="hidden" name="" id="portfolioImg">
</div>
  <div class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <button (click)="submittTask()" 
        class="h-16 flex items-center justify-center gap-3 rounded-2xl bg-blue-600 py-3 text-sm font-black text-white transition-all hover:bg-blue-700 hover:shadow-xl active:scale-95 shadow-lg shadow-blue-100">
        <i class="fas fa-check-circle"></i>
        تم التسليم 
      </button>

      <button class="h-16 flex items-center justify-center gap-3 rounded-2xl bg-white border-2 border-slate-100 py-3 text-sm font-black text-slate-600 transition-all hover:bg-slate-50 active:scale-95">
        <i class="fas fa-comment-dots"></i>
        المراسلة
      </button>
    </div>

    <button class="w-full py-4 text-[11px] font-black text-slate-300 hover:text-red-500 transition-colors uppercase tracking-[0.2em]">
      إلغاء الخدمة نهائياً
    </button>
  </div>
</div>
