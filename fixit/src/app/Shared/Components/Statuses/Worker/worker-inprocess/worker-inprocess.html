<div class="mx-auto overflow-hidden rounded-3xl border border-slate-100 bg-white p-6 shadow-xl shadow-slate-200/50" dir="rtl" >

  <!-- Client Info Header -->
  <div class="mb-5 flex items-center gap-4 p-4 bg-gradient-to-l from-slate-50 to-blue-50/40 rounded-2xl border border-slate-100">
    <div class="relative flex-shrink-0">
      <img src="/workers/client.png"
           alt="Client Avatar"
           class="w-14 h-14 rounded-xl object-cover shadow-md ring-2 ring-white ring-offset-1">
      <div class="absolute -bottom-1 -right-1 h-4 w-4 rounded-full border-2 border-white bg-emerald-500 shadow-sm"></div>
    </div>

    <div class="flex-1 min-w-0">
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">العميل الحالي</p>
      <h3 class="text-base font-bold text-slate-800 truncate">{{clientName()}}</h3>
      <p class="text-[11px] text-emerald-600 font-semibold flex items-center gap-1 mt-0.5">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full inline-block"></span>
        نشط الآن
      </p>
    </div>

    <button class="flex-shrink-0 w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-md shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
      <i class="fas fa-message text-sm"></i>
    </button>
  </div>

  <!-- Status Banner -->
  <div class="mb-5 flex items-center gap-3 px-4 py-3.5 bg-blue-50 rounded-xl border border-blue-100">
    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
      <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
    </div>
    <p class="text-sm font-semibold text-blue-800">تمت الموافقة! يرجى التوجه للعنوان وبدء التنفيذ.</p>
  </div>

  <!-- In Progress Indicator -->
  <div class="mb-6 text-center">
    <div class="relative w-20 h-20 mx-auto flex items-center justify-center mb-4">
      <div class="absolute inset-0 rounded-full bg-blue-400/20 animate-ping"></div>
      <div class="absolute inset-2 rounded-full bg-blue-400/30 animate-pulse"></div>
      <div class="relative w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-300/50">
        <i class="fa fa-spinner fa-spin text-xl"></i>
      </div>
    </div>
    <h3 class="text-xl font-bold text-slate-800">المهمة قيد التنفيذ</h3>
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mt-1">جاري العمل الآن</p>

    <div class="mt-3 h-1.5 bg-slate-100 rounded-full overflow-hidden mx-8">
      <div class="h-full w-1/2 bg-gradient-to-l from-blue-600 to-blue-400 rounded-full animate-pulse"></div>
    </div>
  </div>

  <!-- Proof Image Upload -->
  <div class="mb-5">
    <div class="flex items-center gap-2 mb-3">
      <div class="w-5 h-5 rounded-md bg-blue-100 flex items-center justify-center flex-shrink-0">
        <svg class="w-3 h-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <h5 class="text-sm font-semibold text-slate-600">صورة إثبات التسليم</h5>
      <span class="text-red-400 text-xs font-bold">*مطلوب</span>
    </div>

    @if(!imagePreview()) {
      <label for="portfolioImg" class="border-2 border-dashed border-blue-100 bg-blue-50/30 rounded-xl p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-all group">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm mb-3 group-hover:shadow-md transition-shadow">
          <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="font-bold text-slate-700 text-sm">اضغط لرفع الصورة</p>
        <p class="text-xs text-slate-400 mt-1">PNG, JPG, JPEG — حتى 5 ميجابايت</p>
      </label>
    } @else {
      <div class="relative rounded-xl overflow-hidden border border-slate-100 shadow-sm">
        <img [src]="imagePreview()" loading="lazy" alt="service-image" class="w-full h-48 object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
        <button (click)="imagePreview.set('')" class="absolute top-2 right-2 bg-red-600 text-white h-8 w-8 rounded-lg flex items-center justify-center shadow-md hover:bg-red-700 transition-colors">
          <i class="fas fa-trash text-xs"></i>
        </button>
        <div class="absolute bottom-2 left-2 bg-white/90 backdrop-blur-sm text-emerald-700 text-[10px] font-bold px-2 py-1 rounded-lg flex items-center gap-1">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
          تم الرفع
        </div>
      </div>
    }

    <input type="file" (change)="onFileSelected($event)" class="hidden" name="" id="portfolioImg">
  </div>

  <!-- Action Buttons -->
  <div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <button (click)="submittTask()"
        class="h-14 flex items-center justify-center gap-2 rounded-xl bg-blue-600 text-sm font-bold text-white transition-all hover:bg-blue-700 active:scale-95 shadow-md shadow-blue-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
        تم التسليم
      </button>

      <button class="h-14 flex items-center justify-center gap-2 rounded-xl bg-white border border-slate-200 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-50 hover:border-slate-300 active:scale-95">
        <i class="fas fa-comment-dots text-slate-400"></i>
        المراسلة
      </button>
    </div>

    <button class="w-full py-3 text-xs font-semibold text-slate-300 hover:text-red-500 transition-colors tracking-widest">
      إلغاء الخدمة نهائياً
    </button>
  </div>

</div>
