<div [ngClass]="{'animate-pulse border-3 border-sky-200':service()?.state==stasuses.PENDING}" class="bg-white  rounded-2xl shadow-sm border border-gray-100 p-5 transition-all hover:shadow-md">
  
  <div class="flex items-start justify-between mb-4">
    <div class="flex items-center gap-3">
      <div class="relative">
        <img src="/workers/manWorker.png" 
             class="w-24  rounded-full object-cover border border-gray-100"  loading="lazy"
             alt="user-image">
        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
      </div>
      <div>
        <h3 class="font-bold text-gray-800 text-sm tracking-tight">{{ service()?.workerName }}</h3>
        <p class="text-[11px] text-gray-400 font-medium">{{ service()?.requestDate|date }}</p>
      </div>
    </div>
    
    <span [class]="getStatusClasses()">
      {{getStausByArabic(service()?.state||'') }}
      <i class="ph-clock-bold text-xs"></i> 
    </span>
  </div>

  <div class="mb-6 min-h-12.5">
    <h2 class="text-base font-bold text-gray-700 leading-tight">
      {{ service()?.serviceTitle }}
    </h2>
    <p class="text-[11px] text-gray-400 mt-1">
      رقم الطلب: <span class="font-mono font-[0.6rem] text-gray-400">{{ service()?.serviceId }}</span>
    </p>
  </div>

  <div class="flex gap-2">
    <button [routerLink]="['/mainLayout/ser_details',service()?.serviceId]" class="flex-4 bg-[#1FB6FF] hover:bg-[#0096e0] text-white py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
      عرض التفاصيل
    </button>
    
    <button class="flex-1 flex items-center justify-center border border-gray-200 rounded-xl text-gray-400 hover:bg-gray-50 hover:text-sky-500 transition-colors group">
     <i class="fas fa-heart"></i>
    </button>
  </div>
</div>
