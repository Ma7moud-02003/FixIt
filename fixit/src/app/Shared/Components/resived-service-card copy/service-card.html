<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 transition-all hover:shadow-md" dir="rtl">
  
  <div class="flex items-start justify-between mb-4">
    <div class="flex items-center gap-3">
      <div class="relative">
        <img src="/workers/client.png" 
             class="w-24  rounded-full object-cover border border-gray-100" 
             alt="user-image">
        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
      </div>
      <div>
        <h3 class="font-bold text-gray-600 text-sm tracking-tight">{{ service()?.clientName }}</h3>
        <p class="text-[11px] text-gray-400 font-medium">{{ service()?.requestDate|date }}</p>
      </div>
    </div>
    
    <span [class]="getStatusClasses()" class="text-sm">
      {{getStausByArabic(service()?.state||'') }}
      <i class="ph-clock-bold text-xs"></i> 
    </span>
  </div>

  <div class="mb-6 min-h-12.5">
    <h2 class="text-base font-bold text-gray-700 leading-tight">
      {{ service()?.serviceTitle }}
    </h2>
   
  </div>


  <div class="flex gap-2">
    <button [routerLink]="['/dashboared/ser_details',service()?.serviceId]"  class="flex-4 bg-[#1FB6FF] hover:bg-[#0096e0] text-white py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
      عرض التفاصيل
    </button>
    
    <button class="flex-1 flex items-center justify-center border border-gray-200 rounded-xl text-gray-400 hover:bg-gray-50 hover:text-sky-500 transition-colors group">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
      </svg>
    </button>
  </div>

</div>
