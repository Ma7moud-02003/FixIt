<div
  [ngClass]="{'border-2 border-sky-200 animate-pulse': service()?.state == stasuses.PENDING}"
  class="bg-white rounded-2xl border border-slate-100 p-4 flex flex-col gap-4 transition-all hover:shadow-sm">

  <!-- Header: Avatar + Name + Status Badge -->
  <div class="flex items-start justify-between gap-3">

    <div class="flex items-center gap-3">
      <!-- Avatar -->
      <div class="relative shrink-0">
        <img
          [src]="(role() == 'client' ? service()?.workerImgUrl : service()?.clientImgUrl) || '/worker (1).png'"
          class="w-11 h-11 rounded-full object-cover border border-slate-100"
          loading="lazy"
          alt="user-image">
        <span class="absolute bottom-0.5 right-0.5 w-2.5 h-2.5 bg-emerald-500 border-2 border-white rounded-full"></span>
      </div>

      <!-- Name + Date -->
      <div>
        <h3 class="text-sm font-semibold text-slate-800 leading-tight">
          {{ role() == 'client' ? service()?.workerName : service()?.clientName }}
        </h3>
        <p class="text-[11px] text-slate-400 mt-0.5">{{ service()?.requestDate | date }}</p>
      </div>
    </div>

    <!-- Status Badge -->
    <span [class]="getStatusClasses()" class="inline-flex items-center gap-1.5 shrink-0 text-[11px] font-semibold px-2.5 py-1 rounded-full border">
      {{ getStausByArabic(service()?.state || '') }}
      <i class="ph-clock-bold text-xs"></i>
    </span>

  </div>

  <!-- Title + Order ID -->
  <div class="min-h-10">
    <h2 class="text-sm font-semibold text-slate-700 leading-snug">
      {{ service()?.serviceTitle }}
    </h2>
    
  </div>

  <!-- Actions -->
  <div class="flex gap-2">
    <button
      [routerLink]="[role() == 'worker' ? '/dashboared/ser_details' : '/mainLayout/ser_details', service()?.serviceId]"
      class="flex-1 bg-sky-500 hover:bg-sky-600 text-white py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-95 cursor-pointer">
      عرض التفاصيل
    </button>

    <button [disabled]="service()?.state==stasuses.PRICE_PROCESS"
      [routerLink]="['/chat', service()?.clientId]"
      class="w-11 h-11 flex items-center justify-center border border-slate-200 rounded-xl text-slate-400 hover:bg-sky-50 hover:text-sky-500 hover:border-sky-200 transition-all group">
      <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
    </button>
  </div>

</div>
