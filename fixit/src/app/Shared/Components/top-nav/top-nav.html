<nav class="fixed top-0 z-50 flex h-16 w-full left-0 items-center justify-between bg-white/80 px-6 backdrop-blur-md border-b border-gray-100">
  
  <div class="flex items-center gap-8">
    <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-sky-500 text-white shadow-lg shadow-sky-200 rotate-3">
      <i class="fas fa-hammer text-lg"></i>
    </div>

    <div class="hidden items-center gap-6 md:flex">
      <a routerLink="/mainLayout/home" routerLinkActive="text-sky-500 font-bold" class="text-sm text-gray-600 transition-colors hover:text-sky-500 cursor-pointer">الرئيسية</a>
      <a routerLink="/mainLayout/search" routerLinkActive="text-sky-500 font-bold" class="text-sm text-gray-600 transition-colors hover:text-sky-500 cursor-pointer">تصفح الخدمات</a>
      <a routerLink="/offers" routerLinkActive="text-sky-500 font-bold" class="text-sm text-gray-600 transition-colors hover:text-sky-500 cursor-pointer">العروض</a>
      <a routerLink="/my-services" routerLinkActive="text-sky-500 font-bold" class="text-sm text-gray-600 transition-colors hover:text-sky-500 cursor-pointer">الرسائل</a>
      <a routerLink="/mainLayout/myServices" routerLinkActive="text-sky-500 font-bold" class="text-sm text-gray-600 transition-colors hover:text-sky-500 cursor-pointer">طلباتي</a>
    </div>
  </div>

  <div class="flex items-center gap-2 md:gap-4">
    
    <button routerLink="/my_notifs" class="relative p-2 text-gray-500 hover:bg-gray-50 rounded-full transition-colors group">
      <i class="far fa-bell text-xl group-hover:text-sky-500"></i>
      <span class="absolute top-2 right-2 flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
      </span>
    </button>

    <button [routerLink]="['/chat','']" class="p-2 text-gray-500 hover:bg-gray-50 rounded-full transition-colors group">
      <i class="far fa-comment-dots text-xl group-hover:text-sky-500"></i>
    </button>

    @if(role() === 'client') {
      <button routerLink="/mainLayout/my_favourites" class="p-2 text-gray-500 hover:bg-gray-50 rounded-full transition-colors group">
        <i class="far fa-heart text-xl group-hover:text-red-500"></i>
      </button>
    }

    <div class="h-6 w-px bg-gray-200 mx-1"></div>

    <div class="relative cursor-pointer group">
      <div class="flex items-center gap-2">
        <div class="relative">
          <img 
            src="/icons8-user-50.png" 
            alt="Profile" 
            class="h-9 w-9 rounded-full border-2 border-white object-cover shadow-sm ring-1 ring-gray-100"
          >
          <span class="absolute bottom-0 left-0 h-2.5 w-2.5 rounded-full border-2 border-white bg-green-500"></span>
        </div>
        <i class="fas fa-chevron-down text-[10px] text-gray-400 group-hover:text-gray-600 transition-colors"></i>
      </div>

      <div class="invisible absolute left-0 mt-3 w-48 scale-95 rounded-2xl border border-gray-100 bg-white p-2 opacity-0 shadow-2xl transition-all duration-200 group-hover:visible group-hover:scale-100 group-hover:opacity-100">
        @if(role() == 'client') {
          <div class="px-4 py-2 border-b border-gray-50 mb-1">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">عميل</p>
          </div>
          <a routerLink="/mainLayout/profile" class="flex items-center gap-2 rounded-lg px-4 py-2 text-sm text-gray-700 hover:bg-sky-50 hover:text-sky-600">
            <i class="far fa-user"></i> الملف الشخصي
          </a>
        } @else if(role() == 'worker') {
          <div class="px-4 py-2 border-b border-gray-50 mb-1">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">فني</p>
          </div>
          <a routerLink="/dashboared/profile" class="flex items-center gap-2 rounded-lg px-4 py-2 text-sm text-gray-700 hover:bg-sky-50 hover:text-sky-600">
            <i class="far fa-user"></i> ملف العمل
          </a>
        }
        
        <button (click)="logOut()" class="w-full flex items-center gap-2 rounded-lg px-4 py-2 text-sm text-red-600 hover:bg-red-50 mt-1">
          <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
        </button>
      </div>
    </div>

  </div>
</nav>
