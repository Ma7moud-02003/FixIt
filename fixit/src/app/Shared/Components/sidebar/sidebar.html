<aside class="hidden lg:flex w-[20%] h-screen z-50 bg-white/90 backdrop-blur-xl shadow-[-10px_0_40px_rgba(0,0,0,0.01)] flex-col fixed right-0 top-[9%] pt-8 transition-all duration-300 select-none" dir="rtl">
  
  <div class="px-8 mb-8 justify-center flex items-center gap-3">
    <div class="w-9 h-9 bg-gradient-to-tr from-cyan-500 to-sky-400 rounded-xl flex items-center justify-center shadow-md shadow-cyan-100">
       <i class="fas fa-hammer text-white text-base"></i>
    </div>
    <h2 class="text-2xl font-black text-slate-800 tracking-tighter">Fix<span class="text-cyan-500">it</span></h2>
  </div>

  <div class="flex-1 px-4 space-y-6 overflow-y-auto overflow-x-hidden scrollbar-none [-ms-overflow-style:none] [scrollbar-width:none]">
    
    <div class="px-2">
      <a routerLink="/dashboared" 
         routerLinkActive="bg-cyan-500 text-white shadow-lg shadow-cyan-100 scale-[1.02]" 
         class="flex items-center text-slate-500 gap-4 px-5 py-3 rounded-2xl transition-all duration-300 group hover:bg-slate-50/80">
          <div class="relative">
            <svg class="w-5 h-5 transition-transform group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
          </div>
          <span class="font-bold text-[0.9rem]">لوحة التحكم</span>
      </a>
    </div>

    <nav class="space-y-1.5 px-2">
      <p class="text-[10px] uppercase tracking-[0.15em] text-slate-400 font-extrabold px-5 mb-3 opacity-80">القائمة الرئيسية</p>
      
      <a routerLink="/dashboared/myServices" routerLinkActive="active-link" class="sidebar-item">
        <i class="fas fa-clipboard-list text-base"></i>
        <span>الطلبات</span>
      </a>

      <a [routerLink]="['/chat','']" routerLinkActive="active-link" class="sidebar-item flex justify-between items-center">
        <div class="flex items-center gap-4">
          <i class="fas fa-comment-dots text-base"></i>
          <span>الرسائل</span>
        </div>
        <span class="bg-rose-500 text-[10px] text-white px-2 py-0.5 rounded-full font-black min-w-5 text-center shadow-sm">3</span>
      </a>

      <a routerLink="/dashboared/wallet" routerLinkActive="active-link" class="sidebar-item">
        <i class="fas fa-wallet text-base"></i>
        <span>المحفظة</span>
      </a>

      <a [routerLink]="['/dashboared/reviews','']" routerLinkActive="active-link" class="sidebar-item">
        <i class="fas fa-star text-base"></i>
        <span>التقييمات</span>
      </a>

      <a routerLink="/dashboared/myPortfolio" routerLinkActive="active-link" class="sidebar-item">
        <i class="fas fa-bag-shopping text-base"></i>
        <span>أعمالي</span>
      </a>

      <div class="pt-2 mt-2 border-t border-slate-100/70">
        <a routerLink="/dashboared/profile" routerLinkActive="active-link" class="sidebar-item">
          <i class="fas fa-user-circle text-base"></i>
          <span>الملف الشخصي</span>
        </a>
      </div>
    </nav>
  </div>

  <div class="p-4 mt-auto">
    <button class="flex items-center justify-center gap-3 px-4 py-3.5 w-full text-rose-500 bg-rose-50/40 hover:bg-rose-50 rounded-2xl transition-all duration-200 font-bold text-sm cursor-pointer">
      <i class="fas fa-sign-out-alt rotate-180 transition-transform group-hover:-translate-x-1"></i>
      <span>تسجيل الخروج</span>
    </button>
  </div>
</aside>
