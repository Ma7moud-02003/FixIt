<aside class="hidden lg:flex w-[20%] h-screen z-50 bg-white/80 backdrop-blur-xl border-l border-slate-100 shadow-[20px_0_50px_rgba(0,0,0,0.02)] flex-col fixed right-0 top-[9%] pt-8 transition-all duration-300" dir="rtl">
  
  <div class="px-8 mb-10 justify-center flex items-center gap-3">
    <div class="w-10 h-10 bg-linear-to-br from-blue-600 to-blue-400 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">

    <div class="px-2">
      <a routerLink="" 
         routerLinkActive="bg-blue-600 text-white shadow-xl shadow-blue-100 scale-[1.02]" 
     
         class="flex items-center text-slate-500 gap-4 px-5 py-2 rounded-2xl transition-all duration-300 group hover:bg-slate-50">
          <div class="relative">
            <svg class="w-5 h-5 transition-transform group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">

      <a routerLink="/dashboared/search" routerLinkActive="active-link" class="sidebar-item group">
        <i class="fas fa-search text-lg"></i>
        <span>تصفح الخدمات</span>
      </a>

      <a routerLink="/dashboared/recivedService" routerLinkActive="active-link" class="sidebar-item group">
        <i class="fas fa-clipboard-list text-lg"></i>
        <span>الطلبات</span>
      </a>

      <a routerLink="/dashboared/messages" routerLinkActive="active-link" class="sidebar-item group flex justify-between">
        <div class="flex items-center gap-4">
          <i class="fas fa-comment-dots text-lg"></i>
          <span>الرسائل</span>
        </div>
        <span class="bg-rose-500 text-[10px] text-white px-2 py-0.5 rounded-full font-bold">3</span>

      <a routerLink="/dashboared/wallet" routerLinkActive="active-link" class="sidebar-item group">
        <i class="fas fa-wallet text-lg"></i>

      </a>

      <a [routerLink]="['/dashboared/reviews','']" routerLinkActive="active-link" class="sidebar-item group">
        <i class="fas fa-star text-lg"></i>
        <span>التقييمات</span>
      </a>

        <a routerLink="/dashboared/myPortfolio" routerLinkActive="active-link" class="sidebar-item group">
        <i class="fas fa-bag-shopping text-lg"></i>
        <span> اعمالي </span>
      </a>


      <a routerLink="/dashboared/profile" routerLinkActive="active-link" class="sidebar-item group border-t border-slate-50 pt-4 mt-4">
        <i class="fas fa-user-circle text-lg"></i>
        <span>الملف الشخصي</span>
      </a>
    </nav>

  <div class="p-6 mt-auto">
    <button class="flex items-center gap-4 px-6 py-4 w-full text-rose-500 bg-rose-50/50 hover:bg-rose-50 rounded-3xl transition-all duration-300 group font-black text-sm">
      <i class="fas fa-sign-out-alt rotate-180 group-hover:-translate-x-1 transition-transform"></i>
      <span>تسجيل الخروج</span>
    </button>
