<div class="bg-white border border-slate-100 rounded-2xl p-4 flex flex-col gap-3 transition-all hover:shadow-sm">

  <!-- Top Row: Availability + Rating -->
  <div class="flex items-center justify-between">

    <span
      [ngClass]="worker().availabilityStatus
        ? 'bg-emerald-50 text-emerald-700 border-emerald-200'
        : 'bg-slate-100 text-slate-500 border-slate-200'"
      class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold border transition-colors">
      <span
        [ngClass]="worker().availabilityStatus ? 'bg-emerald-500' : 'bg-slate-400'"
        class="w-1.5 h-1.5 rounded-full">
      </span>
      {{ worker().availabilityStatus ? 'متاح الآن' : 'غير متاح' }}
    </span>

    <span class="inline-flex items-center gap-1 px-2 py-1 bg-amber-50 text-amber-700 text-xs font-semibold rounded-lg border border-amber-100">
      {{ worker().ratingAverage || '0' }}
      <svg class="w-3 h-3 fill-current text-amber-500" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    </span>

  </div>

  <!-- Avatar + Name + Job -->
  <div class="flex flex-col items-center gap-2 py-1">
    <img
      [src]="worker().imgUrl || '/workers/manWorker.png'"
      [alt]="worker().fullName"
      class="w-16 h-16 rounded-full object-cover border border-slate-100"
      loading="lazy">

    <div class="text-center">
      <h3 class="text-sm font-semibold text-slate-800">{{ worker().fullName }}</h3>
      <span class="inline-block mt-1 text-[11px] font-semibold text-sky-700 bg-sky-50 px-2.5 py-0.5 rounded-md border border-sky-100">
        {{ worker().jobTitle || 'فني متخصص' }}
      </span>
    </div>
  </div>

  <!-- Location -->
  <div class="flex items-center justify-center gap-1.5 py-2.5 border-y border-slate-100">
    <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    <span class="text-xs text-slate-400">{{ worker().city || 'القاهرة، مصر' }}</span>
  </div>

  <!-- Actions -->
  <div class="grid grid-cols-2 gap-2">
    <button
      [routerLink]="['/mainLayout/workerProfile', worker().workerId]"
      class="py-2.5 rounded-xl text-xs font-semibold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-all active:scale-95 cursor-pointer">
      التفاصيل
    </button>
    <button
      [routerLink]="['/mainLayout/require', worker().workerId]"
      class="py-2.5 rounded-xl text-xs font-semibold text-white bg-sky-600 hover:bg-sky-700 transition-all active:scale-95 cursor-pointer">
      طلب الخدمة
    </button>
  </div>

</div>
