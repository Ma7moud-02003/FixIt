<div class="relative bg-white border border-slate-100 shadow-sm  overflow-hidden cursor-default">
    <div class="relative h-64 overflow-hidden">
        <img [src]="portfolio()?.imgUrl" loading="lazy"
             class="w-full h-full object-cover">
        
        <div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1  shadow-sm">
            <span class="text-[10px] font-bold text-slate-700 uppercase">
                {{portfolio()?.createdAt | date:'shortDate'}}
            </span>
        </div>
    </div>

    <div class="p-6 space-y-4 text-right">
        <div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">
                {{portfolio()?.title}}
            </h3>
            <p class="text-sm text-slate-500 leading-relaxed line-clamp-2">
                {{portfolio()?.description}}
            </p>
        </div>

        <div class="pt-4 flex items-center justify-between border-t border-slate-50">
            <span class="text-[11px] font-medium text-slate-400 flex items-center gap-2">
                <i class="far fa-calendar-alt"></i> 
                {{portfolio()?.createdAt | date:'longDate'}}
            </span>

            <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-white">
                <i class="fas fa-arrow-left text-xs"></i>
            </div>
        </div>
    </div>
</div>
