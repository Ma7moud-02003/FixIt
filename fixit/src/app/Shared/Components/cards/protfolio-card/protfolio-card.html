<!--
  PORTFOLIO CARD — Magazine horizontal layout
  All original bindings preserved:
    portfolio()?.imgUrl | portfolio()?.title | portfolio()?.description
    portfolio()?.createdAt (date pipe)
  No logic changed — shape only.
-->
<article class="group relative bg-white border border-stone-200 rounded-2xl overflow-hidden
                hover:border-blue-300 hover:shadow-xl hover:shadow-stone-200/60
                transition-all duration-400 flex flex-col sm:flex-row min-h-[180px]">

  <!-- ── IMAGE STRIP (left on RTL = visual left, rendered right) ── -->
  <div class="relative sm:w-56 md:w-64 flex-shrink-0 overflow-hidden bg-stone-100 min-h-[180px]">

    <img
      [src]="portfolio()?.imgUrl || 'assets/default-portfolio.png'"
      [alt]="portfolio()?.title"
      loading="lazy"
      class="absolute inset-0 w-full h-full object-cover
             group-hover:scale-105 transition-transform duration-700"
    >

    <!-- Dark scrim on hover -->
    <div class="absolute inset-0 bg-stone-900/0 group-hover:bg-stone-900/30 transition-colors duration-400 flex items-center justify-center">
      <div class="w-10 h-10 bg-white/0 group-hover:bg-white/90 rounded-xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 scale-75 group-hover:scale-100">
        <i class="fas fa-expand-alt text-stone-700 text-sm"></i>
      </div>
    </div>

    <!-- Date badge pinned to bottom -->
    <div class="absolute bottom-3 right-3 bg-stone-900/70 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg tracking-wider uppercase">
      {{ portfolio()?.createdAt | date:'MMM yyyy' }}
    </div>

  </div>

  <!-- ── CONTENT BLOCK ──────────────────────────────────────── -->
  <div class="flex-1 flex flex-col justify-between p-6 text-right min-w-0">

    <!-- Top: category tag + title + desc -->
    <div class="space-y-3">

      <!-- Category pill -->
      <div class="flex items-center justify-end gap-2">
        <span class="text-[10px] font-black text-blue-700 bg-blue-50 border border-blue-200 px-3 py-1 rounded-full uppercase tracking-widest">
          عمل مميز
        </span>
        <!-- Animated dot: "live / active" feel -->
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
      </div>

      <h3 class="text-lg font-black text-stone-800 group-hover:text-blue-600 transition-colors duration-300 leading-snug">
        {{ portfolio()?.title || 'عنوان المشروع' }}
      </h3>

      <p class="text-sm text-stone-400 leading-relaxed line-clamp-2">
        {{ portfolio()?.description || 'لا يوجد وصف متاح لهذا المشروع حالياً.' }}
      </p>

    </div>

    <!-- Bottom: date + action row -->
    <div class="flex items-center justify-between mt-5 pt-4 border-t border-stone-100">

      <!-- Date with icon -->
      <div class="flex items-center gap-2 text-stone-400">
        <i class="far fa-calendar-check text-blue-500 text-sm"></i>
        <span class="text-xs font-semibold">{{ portfolio()?.createdAt | date:'longDate' }}</span>
      </div>

      <!-- CTA chip -->
      <div class="flex items-center gap-2 bg-stone-900 group-hover:bg-blue-500 text-white group-hover:text-stone-900
                  text-xs font-black px-4 py-2 rounded-xl transition-all duration-300">
        <span>عرض التفاصيل</span>
        <i class="fas fa-arrow-left text-xs group-hover:-translate-x-1 transition-transform duration-300"></i>
      </div>

    </div>

  </div>

  <!-- Accent left-border strip (visible on hover) -->
  <div class="absolute right-0 top-0 h-full w-1 bg-blue-500 scale-y-0 group-hover:scale-y-100
              transition-transform duration-400 origin-top rounded-r-2xl"></div>

</article>
