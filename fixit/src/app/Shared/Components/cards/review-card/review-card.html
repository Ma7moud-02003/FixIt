<div class="rounded-4xl border border-slate-100 bg-white px-6 py-5 my-4 shadow-sm hover:shadow-md transition-shadow duration-300" >
  
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    
    <!-- User Info Section -->
    <div class="flex items-center gap-4">
      <div class="relative">
        <img 
          [src]="review()?.reviewerImgUrl || 'assets/default-user.png'" 
          loading="lazy" 
          alt="User Avatar" 
          class="w-14 h-14 rounded-2xl object-cover bg-slate-50 border border-slate-100 shadow-sm"
        />
        <!-- Badge صغير للتحقق (يعطي موثوقية) -->
        <div class="absolute -bottom-1 -right-1 bg-green-500 text-white w-5 h-5 rounded-full flex items-center justify-center border-2 border-white text-[8px]">
          <i class="fas fa-check"></i>
        </div>
      </div>

      <div class="space-y-1">
        <h4 class="text-base font-black text-slate-900 tracking-tight">{{review()?.reviewerName}}</h4>
        <div class="flex items-center gap-3">
          <span class="bg-cyan-50 text-cyan-700 text-[10px] px-2.5 py-1 rounded-lg font-black uppercase tracking-wider">عميل موثق</span>
          <span class="text-slate-400 text-[11px] flex items-center gap-1.5 font-medium">
            <i class="far fa-calendar-alt text-slate-300"></i>
            {{review()?.createdAt | date:'mediumDate'}}
          </span>
        </div>
      </div>
    </div>

    <!-- Rating Section -->
    <div class="flex items-center bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100">
      <div class="flex gap-1 ml-3">
        @for(star of [1,2,3,4,5]; track star) {
          <i [ngClass]="star <= (review()?.rate || 0) ? 'text-yellow-400' : 'text-slate-200'" 
             class="fas fa-star text-[13px]"></i>
        }
      </div>
      <span class="text-sm font-black text-slate-700 border-r border-slate-200 pr-3">{{review()?.rate}}.0</span>
    </div>
  
  </div>

  <!-- Review Content -->
  <div class="mt-5 relative">
    <!-- علامة اقتباس جمالية لزيادة الاحترافية -->
    <i class="fas fa-quote-right absolute -right-2 -top-2 text-slate-50 text-3xl z-0"></i>
    
    <p class="relative z-10 text-slate-600 leading-relaxed text-sm md:text-base font-medium pr-2">
       {{review()?.comment || 'لا يوجد تعليق متاح حالياً.'}}
    </p>
  </div>
</div>
