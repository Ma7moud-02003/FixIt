<div  class="mx-auto rounded-2xl border border-gray-100 px-5 p-2 my-2">
  
  <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
    
    <div class="flex items-center gap-4">
      <img 
        [src]="review()?.reviewerImgUrl" loading="lazy" 
        alt="User Avatar" 
        class="w-14 h-14 rounded-full object-cover bg-gray-100"
      />
      <div class="space-y-1">
        <h4 class="text-lg font-bold text-gray-900">{{review()?.reviewerName}}</h4>
        <div class="flex items-center gap-2">
          <span class="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-md font-medium">عميل</span>
          <span class="text-gray-400 text-xs flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
           {{review()?.createdAt|date:'short'}}
          </span>
        </div>
      </div>
    </div>
    <div class="py-3">
          @for(star of [1,2,3,4,5];track star)
    {
      <i [ngClass]="{'text-yellow-400':star<=review().rate}"  class="fas fa-star ml-1 text-gray-400"></i>
    }
    </div>
  
  </div>

  <div class="mt-3">
    <p class="text-gray-600 leading-relaxed text-sm md:text-base">
     {{review()?.comment}}
    </p>
  </div>
</div>
